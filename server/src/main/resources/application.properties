spring.application.name=server

# =====================
# PostgreSQL DataSource
# =====================
spring.datasource.url=jdbc:postgresql://localhost:5432/splitwise
spring.datasource.username=postgres
# TODO: Thay YOUR_PASSWORD bằng password PostgreSQL thực tế trên máy bạn
spring.datasource.password=123456
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Server port
server.port=8080

# springdoc / Swagger UI (OpenAPI 3)
springdoc.swagger-ui.path=/swagger-ui
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# JWT (min 32 chars; replace in production)
app.jwt.secret=EventMateDevSecretKeyChangeMe32bytes!!
app.jwt.expiration-ms=86400000
